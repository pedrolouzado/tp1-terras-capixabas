<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Destinos - Terras Capixabas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 m-0">Terras Capixabas</h1>

            <nav>
                <a href="index.html" class="text-white text-decoration-none me-3">Home</a>
                <a href="cadastro.html" class="text-white text-decoration-none">Cadastro</a>
            </nav>
        </div>
    </header>

    <main class="container my-5">

        <h2 class="mb-4">Cadastro de Destinos</h2>

        <form id="form-destino" class="row g-3 mb-5">

            <input type="hidden" id="id">

            <div class="col-md-6">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" id="nome" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label for="categoria" class="form-label">Categoria</label>
                <input type="text" id="categoria" class="form-control" required>
            </div>

            <div class="col-12">
                <label for="descricao" class="form-label">Descrição</label>
                <input type="text" id="descricao" class="form-control" required>
            </div>

            <div class="col-12">
                <label for="conteudo" class="form-label">Conteúdo</label>
                <textarea id="conteudo" class="form-control" rows="3" required></textarea>
            </div>

            <div class="col-md-8">
                <label for="imagem_principal" class="form-label">Imagem principal</label>
                <input type="text" id="imagem_principal" class="form-control" placeholder="assets/img/imagem.jpg" required>
            </div>

            <div class="col-md-4">
                <label for="destaque" class="form-label">Destaque</label>
                <select id="destaque" class="form-select">
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>

            <div class="col-12 d-flex gap-2">
                <button type="button" id="btn-inserir" class="btn btn-success">Inserir</button>
                <button type="button" id="btn-alterar" class="btn btn-warning">Alterar</button>
                <button type="button" id="btn-excluir" class="btn btn-danger">Excluir</button>
                <button type="reset" class="btn btn-secondary">Limpar</button>
            </div>

        </form>

        <h3 class="mb-3">Listagem de Destinos</h3>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Destaque</th>
                    </tr>
                </thead>

                <tbody id="tabela-destinos">
                </tbody>
            </table>
        </div>

    </main>

    <script src="assets/js/crud.js"></script>
</body>
</html>
